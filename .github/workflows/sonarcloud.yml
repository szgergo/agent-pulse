name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sonarcloud-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check SonarCloud prerequisites
        id: precheck
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -f build.gradle.kts ] && [ -f settings.gradle.kts ] && [ -f gradlew ]; then
            echo "has_gradle=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_gradle=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f sonar-project.properties ]; then
            echo "has_sonar_properties=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_sonar_properties=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "${SONAR_TOKEN:-}" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when SONAR_TOKEN is unavailable
        if: ${{ steps.precheck.outputs.has_token != 'true' }}
        run: |
          echo "SONAR_TOKEN is missing; analysis cannot run yet."
          echo "has_gradle=${{ steps.precheck.outputs.has_gradle }}"
          echo "has_sonar_properties=${{ steps.precheck.outputs.has_sonar_properties }}"
          echo "has_token=${{ steps.precheck.outputs.has_token }}"
          echo "Add the SONAR_TOKEN repository secret to activate analysis."

      - name: Set up JetBrains Runtime 25
        if: ${{ steps.precheck.outputs.has_gradle == 'true' && steps.precheck.outputs.has_token == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: '25'

      - name: Set up Gradle
        if: ${{ steps.precheck.outputs.has_gradle == 'true' && steps.precheck.outputs.has_token == 'true' }}
        uses: gradle/actions/setup-gradle@v4

      - name: Build and analyze with SonarCloud
        if: ${{ steps.precheck.outputs.has_gradle == 'true' && steps.precheck.outputs.has_token == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew --no-daemon build sonar

      - name: Analyze with SonarCloud GitHub Action
        if: ${{ steps.precheck.outputs.has_gradle != 'true' && steps.precheck.outputs.has_token == 'true' && steps.precheck.outputs.has_sonar_properties == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v4.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip when no analysis path is available
        if: ${{ steps.precheck.outputs.has_token == 'true' && steps.precheck.outputs.has_gradle != 'true' && steps.precheck.outputs.has_sonar_properties != 'true' }}
        run: |
          echo "SONAR_TOKEN exists, but no analysis path is configured."
          echo "Add either Gradle project files or sonar-project.properties."

